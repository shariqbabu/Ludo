<!DOCTYPE html>
<html lang="en">

<title>Ludo Game</title>

  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: Arial, sans-serif;

    color: #fff;
    margin-bottom: 15px;
    font-size: 28px;
    text-shadow: 0 0 10px rgba(255,255,255,0.5);
  }

    position: relative;
    width: 600px;
    height: 600px;
  }

  #boardImg {
    width: 600px;
    height: 600px;
    position: absolute;
    top: 0; left: 0;
    border-radius: 16px;
  }

  #gameCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 600px;
    height: 600px;
    pointer-events: none;
  }

  .controls {
    margin-top: 15px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
  }
  button:hover { transform: scale(1.05); opacity: 0.9; }

  #rollBtn { background: #f39c12; color: #fff; font-size: 18px; padding: 12px 30px; }

  .dice-display {
    margin-top: 10px;
    font-size: 60px;
    text-align: center;
  }

  .info-panel {
    margin-top: 10px;
    color: #fff;
    font-size: 16px;
    text-align: center;
    background: rgba(0,0,0,0.5);
    padding: 8px 20px;
    border-radius: 8px;
    min-width: 300px;
  }

  .turn-indicator {
    display: flex;
    gap: 10px;
    margin-top: 8px;
    justify-content: center;
  }

  .player-badge {
    padding: 5px 14px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 14px;
    opacity: 0.4;

    display: flex;
    gap: 8px;
    margin-top: 8px;
    justify-content: center;
    flex-wrap: wrap;

  .pawn-btn {

</head>

  }
  
  if(pos >= 52 && pos <= 57) {
    // In home column (52=first, 57=center)
    const homeCol = HOME_PATHS[player];
    const homeIdx = pos - 52;
    if(homeIdx < homeCol.length) {
      const [c,r] = homeCol[homeIdx];
      return { x: c*CELL+CELL/2, y: r*CELL+CELL/2 };
    }
  }
  
  // Finished - center
  return { x: W/2, y: H/2 };
}

// Draw pawn SVG-style
function drawPawn(ctx, x, y, color, label, isActive) {
  const r = 14;
  
  // Shadow
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 8;
  ctx.shadowOffsetY = 3;
  
  // Outer ring
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fillStyle = isActive ? '#fff' : 'rgba(255,255,255,0.7)';
  ctx.fill();
  
  ctx.restore();
  
  // Body circle
  ctx.beginPath();
  ctx.arc(x, y, r-3, 0, Math.PI*2);
  ctx.fillStyle = color;
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 1;
  ctx.stroke();
  
  // Highlight
  ctx.beginPath();
  ctx.arc(x-3, y-3, r/3, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fill();
  
  // Label
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${r-4}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, x, y+1);
  
  // Active glow
  if(isActive) {
    ctx.beginPath();
    ctx.arc(x, y, r+3, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,255,255,0.8)';
    ctx.lineWidth = 2;
    ctx.stroke();
    
    // Pulse animation indicator
    ctx.beginPath();
    ctx.arc(x, y, r+6, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,255,0,0.5)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}

// Draw full board (fallback if PNG doesn't load)
function drawFallbackBoard(canvas) {
  const ctx = canvas.getContext('2d');
  const C = 40; // cell size
  
  // Board background
  ctx.fillStyle = '#e0e0e0';
  ctx.roundRect(0,0,600,600,16);
  ctx.fill();
  
  // Color quadrants
  const quads = [
    {x:0,y:0,w:240,h:240,color:'#2196F3'},       // Blue TL
    {x:360,y:0,w:240,h:240,color:'#f44336'},     // Red TR
    {x:0,y:360,w:240,h:240,color:'#FFC107'},     // Yellow BL
    {x:360,y:360,w:240,h:240,color:'#4CAF50'},   // Green BR
  ];
  
  quads.forEach(q => {
    ctx.fillStyle = q.color;
    ctx.fillRect(q.x, q.y, q.w, q.h);
    
    // Circle in each quadrant
    ctx.beginPath();
    ctx.arc(q.x+q.w/2, q.y+q.h/2, 85, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 4;
    ctx.stroke();
  });
  
  // Draw grid cells
  for(let row=0; row<15; row++) {
    for(let col=0; col<15; col++) {
      // Skip home base areas
      if((row<6 && col<6) || (row<6 && col>8) || 
         (row>8 && col<6) || (row>8 && col>8)) continue;
      if(row===7 && col===7) continue; // center
      
      ctx.strokeStyle = 'rgba(0,0,0,0.15)';
      ctx.lineWidth = 1;
      ctx.strokeRect(col*C+1, row*C+1, C-2, C-2);
    }
  }
  
  // Color home columns
  // Blue home column: col=7, rows 1-5 (row=7 is middle)  
  // Actually: Blue home = row=7, cols 1-6 going right
  const homeColumnCells = [
    {cells: HOME_PATHS.blue.slice(0,-1), color:'#2196F3'},
    {cells: HOME_PATHS.red.slice(0,-1), color:'#f44336'},
    {cells: HOME_PATHS.green.slice(0,-1), color:'#4CAF50'},
    {cells: HOME_PATHS.yellow.slice(0,-1), color:'#FFC107'},
  ];
  
  homeColumnCells.forEach(({cells, color}) => {
    cells.forEach(([c,r]) => {
      ctx.fillStyle = color;
      ctx.fillRect(c*C+2, r*C+2, C-4, C-4);
    });
  });
  
  // Center square
  ctx.fillStyle = '#9E9E9E';
  ctx.fillRect(6*C, 6*C, 3*C, 3*C);
  
  // Draw triangle in center
  ctx.beginPath();
  ctx.moveTo(W/2, H/2-35);
  ctx.lineTo(W/2-35, H/2+25);
  ctx.lineTo(W/2+35, H/2+25);
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fill();
}

// Main draw function
function draw() {
  ctx.clearRect(0, 0, W, H);
  
  const currentPlayerName = PLAYERS[gameState.currentPlayer];
  
  PLAYERS.forEach(player => {
    gameState.pawns[player].forEach((pawn, idx) => {
      const pixel = getPawnPixel(player, idx);
      const isCurrentPlayer = player === currentPlayerName;
      const isMovable = isCurrentPlayer && gameState.diceRolled && canMove(player, idx);
      
      // Offset multiple pawns on same cell
      const offset = getStackOffset(player, idx);
      
      drawPawn(ctx, pixel.x + offset.x, pixel.y + offset.y, 
               COLORS[player], (idx+1).toString(), isMovable);
    });
  });
}

function getStackOffset(player, pawnIdx) {
  // Check if other pawns are at same position
  const myPos = getPawnPixel(player, pawnIdx);
  let count = 0;
  let myCount = 0;
  
  PLAYERS.forEach(p => {
    gameState.pawns[p].forEach((pw, i) => {
      if(p === player && i === pawnIdx) { myCount = count; return; }
      const op = getPawnPixel(p, i);
      if(Math.abs(op.x - myPos.x) < 5 && Math.abs(op.y - myPos.y) < 5) count++;
    });
  });
  
  const offsets = [{x:0,y:0},{x:8,y:0},{x:0,y:8},{x:8,y:8}];
  return offsets[myCount % 4] || {x:0,y:0};
}

function canMove(player, pawnIdx) {
  const pawn = gameState.pawns[player][pawnIdx];
  const dice = gameState.diceValue;
  
  if(pawn.pos === -1) return dice === 6; // Need 6 to enter
  if(pawn.pos === 58) return false; // Already finished
  
  const newPos = pawn.pos + dice;
  if(newPos <= 57) return true;
  
  return false;
}

function movePawn(player, pawnIdx) {
  if(player !== PLAYERS[gameState.currentPlayer]) return;
  if(!gameState.diceRolled) return;
  if(!canMove(player, pawnIdx)) return;
  
  const pawn = gameState.pawns[player][pawnIdx];
  const dice = gameState.diceValue;
  
  if(pawn.pos === -1 && dice === 6) {
    pawn.pos = 0; // Enter board
  } else if(pawn.pos >= 0) {
    pawn.pos += dice;
    if(pawn.pos === 57) {
      pawn.pos = 58; // Finished!
      showMessage(`${player.toUpperCase()} pawn ${pawnIdx+1} reached home! 🎉`);
    }
    
    // Check captures (simplified)
    checkCapture(player, pawnIdx);
  }
  
  gameState.diceRolled = false;
  
  // Check if dice was 6, player gets another turn
  if(dice !== 6) {
    gameState.currentPlayer = (gameState.currentPlayer + 1) % 4;
  }
  
  updateUI();
  draw();
}

function checkCapture(player, pawnIdx) {
  const myPixel = getPawnPixel(player, pawnIdx);
  const myPos = gameState.pawns[player][pawnIdx].pos;
  
  // Safe squares (starred positions)
  const safePathPositions = [8, 13, 21, 26, 34, 39, 47, 0];
  
  PLAYERS.forEach(otherPlayer => {
    if(otherPlayer === player) return;
    
    gameState.pawns[otherPlayer].forEach((otherPawn, otherIdx) => {
      if(otherPawn.pos < 0 || otherPawn.pos >= 52) return;
      
      const otherPixel = getPawnPixel(otherPlayer, otherIdx);
      const dist = Math.sqrt(
        Math.pow(otherPixel.x - myPixel.x, 2) + 
        Math.pow(otherPixel.y - myPixel.y, 2)
      );
      
      if(dist < 5) {
        // Check if safe square
        const startIdx = START_IDX[player];
        const mainPathIdx = (startIdx + myPos) % 52;
        // Don't capture on safe squares (simplified check)
        if(!safePathPositions.includes(mainPathIdx)) {
          otherPawn.pos = -1; // Send to home base
          showMessage(`${player.toUpperCase()} captured ${otherPlayer.toUpperCase()} pawn! 🎯`);
        }
      }
    });
  });
}

function showMessage(msg) {
  document.getElementById('statusText').textContent = msg;
  setTimeout(() => updateUI(), 2000);
}

const DICE_FACES = ['', '⚀','⚁','⚂','⚃','⚄','⚅'];

function rollDice() {
  if(gameState.diceRolled) return;
  
  // Animate dice
  let count = 0;
  const interval = setInterval(() => {
    const tempVal = Math.floor(Math.random()*6)+1;
    document.getElementById('diceDisplay').textContent = DICE_FACES[tempVal];
    count++;
    if(count > 10) {
      clearInterval(interval);
      const val = Math.floor(Math.random()*6)+1;
      gameState.diceValue = val;
      gameState.diceRolled = true;
      document.getElementById('diceDisplay').textContent = DICE_FACES[val];
      
      const player = PLAYERS[gameState.currentPlayer];
      const movableCount = gameState.pawns[player].filter((_,i) => canMove(player,i)).length;
      
      if(movableCount === 0) {
        // No moves possible
        setTimeout(() => {
          if(val !== 6) {
            gameState.currentPlayer = (gameState.currentPlayer + 1) % 4;
          }
          gameState.diceRolled = false;
          updateUI();
          draw();
        }, 1000);
        document.getElementById('statusText').textContent = `${player.toUpperCase()} - No valid moves! Turn skipped.`;
      } else {
        updateUI();
        showPawnButtons();
      }
      draw();
    }
  }, 80);
}

function showPawnButtons() {
  const player = PLAYERS[gameState.currentPlayer];
  const container = document.getElementById('pawnBtns');
  container.innerHTML = '';
  
  gameState.pawns[player].forEach((pawn, idx) => {
    if(canMove(player, idx)) {
      const btn = document.createElement('button');
      btn.className = 'pawn-btn';
      btn.style.background = COLORS[player];
      btn.style.color = '#fff';
      btn.textContent = `P${idx+1}`;
      btn.onclick = () => {
        movePawn(player, idx);
        container.innerHTML = '';
      };
      container.appendChild(btn);
    }
  });
}

function updateUI() {
  const player = PLAYERS[gameState.currentPlayer];
  
  PLAYERS.forEach((p, i) => {
    const badge = document.getElementById(`badge${i}`);
    badge.classList.toggle('active', i === gameState.currentPlayer);
  });
  
  if(!gameState.diceRolled) {
    document.getElementById('statusText').textContent = 
      `${player.toUpperCase()}'s turn - Roll the dice!`;
  } else {
    document.getElementById('statusText').textContent = 
      `${player.toUpperCase()} rolled ${gameState.diceValue} - Select a pawn!`;
  }
}

function resetGame() {
  gameState = {
    currentPlayer: 0,
    diceValue: 0,
    diceRolled: false,
    pawns: {
      blue:   [{pos:-1},{pos:-1},{pos:-1},{pos:-1}],
      red:    [{pos:-1},{pos:-1},{pos:-1},{pos:-1}],
      green:  [{pos:-1},{pos:-1},{pos:-1},{pos:-1}],
      yellow: [{pos:-1},{pos:-1},{pos:-1},{pos:-1}]
    }
  };
  document.getElementById('diceDisplay').textContent = '🎲';
  document.getElementById('pawnBtns').innerHTML = '';
  updateUI();
  draw();
}

// Canvas click handler for pawns
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  
  const player = PLAYERS[gameState.currentPlayer];
  if(!gameState.diceRolled) return;
  
  gameState.pawns[player].forEach((pawn, idx) => {
    const pixel = getPawnPixel(player, idx);
    const offset = getStackOffset(player, idx);
    const px = pixel.x + offset.x;
    const py = pixel.y + offset.y;
    
    const dist = Math.sqrt((mx-px)**2 + (my-py)**2);
    if(dist < 20 && canMove(player, idx)) {
      movePawn(player, idx);
      document.getElementById('pawnBtns').innerHTML = '';
    }
  });
});

// Pointer cursor on hoverable pawns
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  
  const player = PLAYERS[gameState.currentPlayer];
  let hovering = false;
  
  if(gameState.diceRolled) {
    gameState.pawns[player].forEach((pawn, idx) => {
      const pixel = getPawnPixel(player, idx);
      const offset = getStackOffset(player, idx);
      const dist = Math.sqrt((mx-pixel.x-offset.x)**2+(my-pixel.y-offset.y)**2);
      if(dist < 20 && canMove(player, idx)) hovering = true;
    });
  }
  
  canvas.style.cursor = hovering ? 'pointer' : 'default';
});

// Check if PNG loaded, else draw fallback
document.getElementById('boardImg').onload = function() {
  console.log('Board PNG loaded!');
};

document.getElementById('boardImg').onerror = function() {
  console.log('PNG not found, using canvas fallback');
  this.style.display = 'none';
  const fb = document.getElementById('fallbackBoard');
  fb.style.display = 'block';
  drawFallbackBoard(fb);
};

// Animation loop
let animFrame;
function gameLoop() {
  draw();
  animFrame = requestAnimationFrame(gameLoop);
}

// Init
updateUI();
gameLoop();

// Pulse animation for active pawns
let pulseTime = 0;
function pulseLoop() {
  pulseTime += 0.05;
  draw();
  
  const player = PLAYERS[gameState.currentPlayer];
  if(gameState.diceRolled) {
    gameState.pawns[player].forEach((pawn, idx) => {
      if(canMove(player, idx)) {
        const pixel = getPawnPixel(player, idx);
        const offset = getStackOffset(player, idx);
        const pulseR = 18 + Math.sin(pulseTime)*4;
        
        ctx.beginPath();
        ctx.arc(pixel.x+offset.x, pixel.y+offset.y, pulseR, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(255,255,0,${0.4+Math.sin(pulseTime)*0.3})`;
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    });
  }
  
  requestAnimationFrame(pulseLoop);
}

cancelAnimationFrame(animFrame);
pulseLoop();
</script>
